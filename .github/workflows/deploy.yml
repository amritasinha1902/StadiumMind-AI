name: StadiumMind AI CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Backend Syntax Check
        run: |
          python -m compileall backend

      # Authenticating with Google Cloud (Requires GCP service account key secret)
      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker Push
        if: github.ref == 'refs/heads/main'
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Backend Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stadiummind-repo/backend-api:latest ./backend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stadiummind-repo/backend-api:latest

      - name: Deploy to Cloud Run
        if: github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy stadiummind-backend-api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stadiummind-repo/backend-api:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,GEMINI_MODEL=gemini-1.5-flash" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --quiet

  frontend-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STADIUMMIND_AI }}'
          channelId: live
          projectId: stadiummind-ai
